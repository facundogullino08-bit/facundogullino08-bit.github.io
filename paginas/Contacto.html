<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1>
            Contacto
        </h1>
        <nav>
            <ol>
                <li><a href="../index.html">Inicio</a></li>
                <li><a href="#">Contacto</a></li>
                <li><a href="./estadios.html">Estadios</a></li>
            </ol>
        </nav>
    </header>
    <main>
        <section>
            <h2 style="text-align: center;">¿Tenés alguna consulta?</h2>
            <p style="text-align: center;">Dejanos tu mensaje y te respondemos a la brevedad.</p>

            <div class="form_contenedor">
                <form>
                    <label for="nombre">Nombre</label>
                    <input type="text" id="nombre" name="nombre" placeholder="Tu nombre">

                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="tu@email.com">

                    <label for="mensaje">Mensaje</label>
                    <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribí tu consulta..."></textarea>

                    <button type="submit">Enviar</button>
                </form>
            </div>
        </section>
    </main>
    <footer>
        <p>Trabajo práctico - Diseño Web | Talento Tech</p>
    </footer>
</body>
</html>
